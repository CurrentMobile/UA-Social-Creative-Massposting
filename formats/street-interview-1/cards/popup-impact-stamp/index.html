<!doctype html>
<!--
  PATTERN C — "Impact Stamp"
  Use for: a short, punchy claim (a guarantee, a price, "NO CATCH", a warning)
  that SLAMS into frame rather than gently popping in — reserve for the single
  most emphatic beat in the video (used once, not per-beat).
  Source: card_free (Ask Your Phone For A Raise) — "NO CATCH. / 100% FREE".
  Swap the two text lines; keep the choreography.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }
      #root { position: relative; width: 1080px; height: 1920px; overflow: hidden; background: transparent; }
      .stamp {
        /* NOTE: position this off to one side (not dead-center) so it doesn't
           sit on top of the interviewee's face — pick a screen-third that's
           empty at this beat and check against the actual footage. */
        position: absolute; left: 50px; top: 1010px; width: 560px;
        background: #ffffff; border-radius: 46px; padding: 44px 20px;
        box-shadow: 0 26px 70px rgba(0,0,0,.55); text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        border: 10px solid #17a34a;
      }
      .stamp .line1 { font-weight: 900; font-size: 56px; color: #141414; letter-spacing: 1px; }
      .stamp .line2 { font-weight: 900; font-size: 100px; color: #17a34a; line-height: 1.05; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="1.6"
         data-width="1080" data-height="1920">
      <div class="clip stamp" id="stamp" data-start="0" data-duration="1.6">
        <div class="line1">REPLACE ME.</div>
        <div class="line2">REPLACE ME</div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      // 1. SLAM IN — start OVERSIZED (scale 2.2, tilted -10deg) and opacity 0,
      //    then snap down to scale 1 / -4deg with power3.in (accelerating —
      //    the opposite feel from the back.out "gentle overshoot" pops used
      //    in the other two patterns). This is what makes it read as an
      //    IMPACT rather than a friendly pop-in. Keep duration short (~0.28s).
      tl.fromTo("#stamp", {scale:2.2, rotation:-10, opacity:0, transformOrigin:"50% 50%"},
        {scale:1, rotation:-4, opacity:1, duration:0.28, ease:"power3.in"}, 0.0);
      // 2. IMPACT SHAKE — 3 rapid tiny left-right jitters right on landing
      //    (x:10, duration:0.05, yoyo, repeat:3, ease:"none" — LINEAR, not
      //    eased, is what sells the "shake" rather than a wobble).
      tl.to("#stamp", {x:10, duration:0.05, yoyo:true, repeat:3, ease:"none"}, 0.28);
      // 3. SETTLE / BREATHE — one slow rotation+scale yoyo once the shake
      //    dies down, reads as the stamp "settling" into its resting pose.
      tl.to("#stamp", {rotation:-2, scale:1.04, duration:0.5, yoyo:true, repeat:1, ease:"sine.inOut"}, 0.5);
      // 4. EXIT — quick shrink+fade, no stagger needed (single element).
      tl.to("#stamp", {scale:0.85, opacity:0, duration:0.2, ease:"power2.in"}, 1.4);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
